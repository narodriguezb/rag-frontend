# Revisión de seguridad con Claude (equivalente a /security-review).
# Action dedicada de Anthropic: analiza el diff del PR en busca de vulnerabilidades
# y comenta los hallazgos en el PR.
name: Claude Security Review

on:
  pull_request:
    branches: [master]

permissions:
  contents: read
  pull-requests: write

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 2

      - uses: anthropics/claude-code-security-review@main
        with:
          # OJO: aquí el input es con guiones (claude-api-key), no underscore.
          claude-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          comment-pr: 'true'                         # publica los hallazgos en el PR
          claude-model: 'claude-sonnet-4-6'
          exclude-directories: 'node_modules,dist,build,coverage,reports'
