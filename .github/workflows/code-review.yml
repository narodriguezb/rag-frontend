# Revisión de código automática con Claude (equivalente a /code-review).
# Se ejecuta en cada PR a master y publica los hallazgos como comentarios del PR.
name: Claude Code Review

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize]   # al abrir el PR y en cada nuevo push al PR

# pull-requests: write -> permite que Claude comente en el PR.
permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2   # necesita el commit previo para ver el diff del PR

      # Action oficial de Anthropic. Usa ANTHROPIC_API_KEY desde los secrets del repo.
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Instrucción de revisión (modo no interactivo, sin mención @claude).
          prompt: |
            Review this pull request for correctness bugs, code quality,
            best practices and potential security issues. Be concise and
            post the findings as PR review comments.
          # claude_args pasa flags al CLI: modelo y límite de turnos (control de costo).
          claude_args: "--model claude-sonnet-4-6 --max-turns 6"
