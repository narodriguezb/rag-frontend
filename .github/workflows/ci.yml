# Pipeline CI/CD del frontend (React + Vite + TypeScript).
# - En PR a master: corren los gates (quality) + las reviews de Gemini (code y security, advisory).
# - En push/merge a master: corre quality y, si pasa, deploy a Firebase Hosting.
# El ruleset de master exige que los checks 'quality' y 'security_review' pasen para poder mergear.
name: CI/CD frontend

on:
  push:
    branches: [master]        # merge a master -> calidad + deploy
  pull_request:
    branches: [master]        # PR contra master -> calidad + reviews de Gemini
  workflow_dispatch:          # ejecución manual desde Actions

# id-token: write -> auth a Google/Firebase/Vertex vía WIF (sin claves).
# pull-requests: write -> que las reviews de Gemini puedan comentar el PR.
permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  PROJECT_ID: rag-proyect-499005

jobs:
  # ----------------------------------------------------------------------------
  # Job 1: calidad y seguridad. Gate del deploy.
  # ----------------------------------------------------------------------------
  quality:
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # historial completo para SonarQube

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Type-check + build       # tsc -b + vite build; usa VITE_API_URL (var de Actions)
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_BUILD_VERSION: ${{ github.sha }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

      - name: Tests + coverage         # vitest; genera coverage/lcov.info para SonarQube
        run: npm run coverage

      - name: Mutation testing (stryker break >= 50%)
        run: npm run mutation

      - name: Trivy filesystem scan    # vulnerabilidades de deps/archivos (solo fixables)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
          format: table

      - name: Snyk scan (dependencias npm)   # SCA de Snyk; advisory (no bloquea el deploy)
        if: ${{ env.SNYK_TOKEN != '' }}
        continue-on-error: true
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      - name: SonarQube Cloud scan     # análisis estático + cobertura (no bloqueante)
        if: ${{ env.SONAR_TOKEN != '' }}
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # Job 2: revisión de código con Gemini (run-gemini-cli sobre Vertex AI). Solo en PR. Advisory.
  code_review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: google-github-actions/run-gemini-cli@v0.1.22
        env:
          GEMINI_MODEL: gemini-2.5-flash
        with:
          use_vertex_ai: true
          gcp_workload_identity_provider: projects/235944902030/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          gcp_service_account: gh-deployer@rag-proyect-499005.iam.gserviceaccount.com
          gcp_project_id: rag-proyect-499005
          gcp_location: us-central1
          gcp_token_format: access_token
          prompt: |
            You are reviewing a pull request in this React + Vite + TypeScript repository.
            Inspect the PR diff for correctness bugs, code quality and best practices.
            Be concise and post your findings as comments on the pull request using the
            available GitHub tools.

  # Job 3: revisión de seguridad con Gemini (run-gemini-cli sobre Vertex AI). Solo en PR. Advisory.
  security_review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 2
      - uses: google-github-actions/run-gemini-cli@v0.1.22
        env:
          GEMINI_MODEL: gemini-2.5-flash
        with:
          use_vertex_ai: true
          gcp_workload_identity_provider: projects/235944902030/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          gcp_service_account: gh-deployer@rag-proyect-499005.iam.gserviceaccount.com
          gcp_project_id: rag-proyect-499005
          gcp_location: us-central1
          gcp_token_format: access_token
          prompt: |
            You are performing a security review of this pull request (React + Vite + TypeScript
            frontend). Analyze the PR diff for security vulnerabilities (XSS, injection, leaked
            secrets, unsafe DOM/dangerouslySetInnerHTML, insecure dependencies, exposed tokens).
            Ignore the node_modules, dist, build, coverage and reports directories. Post concise
            findings as pull request comments. This review is advisory and does not block.

  # Job 3b: reporte de seguridad consolidado (sticky comment). Solo en PR. No bloqueante.
  security_report:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy (reporte JSON, no bloqueante)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: false
          format: json
          output: trivy.json
          exit-code: '0'

      - name: Construir reporte
        run: |
          total=$(jq '[.Results[]?.Vulnerabilities[]?] | length' trivy.json)
          crit=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy.json)
          high=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy.json)
          med=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length' trivy.json)
          rows=$(jq -r '[.Results[]?.Vulnerabilities[]?] | sort_by(.Severity) | .[:25] | .[] | "| \(.Severity) | \(.PkgName) | \(.InstalledVersion) | \(.FixedVersion // "—") | \(.VulnerabilityID) |"' trivy.json)
          {
            echo "## 🔐 Reporte de seguridad del PR (no bloqueante)"
            echo ""
            echo "### Trivy — dependencias y archivos"
            echo "Total: **$total** · CRITICAL: **$crit** · HIGH: **$high** · MEDIUM: **$med**"
            echo ""
            if [ -n "$rows" ]; then
              echo "| Sev | Paquete | Instalada | Fix | ID |"
              echo "|---|---|---|---|---|"
              echo "$rows"
              if [ "$total" -gt 25 ]; then echo ""; echo "_…mostrando 25 de $total._"; fi
            else
              echo "✅ Sin vulnerabilidades detectadas por Trivy."
            fi
            echo ""
            echo "---"
            echo "🤖 **Gemini security review** comenta sus hallazgos por separado en este PR."
            echo "📊 **Snyk / SonarQube**: ver sus checks/dashboards (advisory)."
            echo ""
            echo "> Reporte informativo. El gate real sigue siendo \`quality\`: Trivy bloquea ahí las vulnerabilidades con fix de severidad alta; este reporte muestra el panorama completo (incluye MEDIUM y sin-fix)."
          } > security-report.md

      - name: Comentario sticky en el PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: security-report
          path: security-report.md

  # ----------------------------------------------------------------------------
  # Job 4: deploy a Firebase Hosting. Solo tras 'quality' y solo en push a master.
  # ----------------------------------------------------------------------------
  deploy:
    needs: quality
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_BUILD_VERSION: ${{ github.sha }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/235944902030/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: gh-deployer@rag-proyect-499005.iam.gserviceaccount.com

      - name: Deploy to Firebase Hosting
        run: npx --yes firebase-tools@latest deploy --only hosting --project "$PROJECT_ID" --non-interactive
